<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article | English Learning Lab</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #1a1a2e;
    }

    .header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid #e67e22;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      text-decoration: none;
      color: white;
    }

    .logo span {
      color: #e67e22;
    }

    .back-link {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .article-header {
      margin-bottom: 32px;
    }

    .article-tag {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .tag-free {
      background: #27ae60;
      color: white;
    }

    .tag-premium {
      background: #e67e22;
      color: white;
    }

    .article-title {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .article-meta {
      display: flex;
      gap: 16px;
      color: #666;
      font-size: 0.85rem;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .article-image {
      width: 100%;
      border-radius: 12px;
      margin: 32px 0;
    }

    .article-content {
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .article-content p {
      margin-bottom: 1.2em;
    }

    .article-content h2 {
      font-size: 1.5rem;
      margin: 1.5em 0 0.5em;
    }

    .article-content h3 {
      font-size: 1.2rem;
      margin: 1.2em 0 0.5em;
    }

    .article-content ul, .article-content ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    .paywall {
      background: white;
      border: 2px solid #e67e22;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      margin-top: 32px;
    }

    .paywall h3 {
      font-size: 1.5rem;
      margin-bottom: 16px;
    }

    .paywall p {
      color: #666;
      margin-bottom: 24px;
    }

    .paywall-plans {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .plan-pill {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px 24px;
      min-width: 140px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .plan-pill:hover, .plan-pill.selected {
      border-color: #e67e22;
      background: rgba(230,126,34,0.05);
    }

    .plan-name {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    .plan-price {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e67e22;
    }

    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #e67e22;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #d35400;
    }

    .preview-blur {
      max-height: 300px;
      overflow: hidden;
      position: relative;
    }

    .preview-blur::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(to bottom, transparent, white);
    }

    .share-section {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .share-btn {
      padding: 8px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      font-size: 0.8rem;
      text-decoration: none;
      color: #666;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }

    .share-btn:hover {
      border-color: #e67e22;
      color: #e67e22;
    }

    .more-section {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .more-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .more-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 24px;
    }

    .more-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }

    .more-card:hover {
      transform: translateY(-3px);
    }

    .more-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
    }

    .more-card-content {
      padding: 12px;
    }

    .more-card-title {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .loading, .error {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #e67e22;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer {
      background: #1a1a2e;
      color: rgba(255,255,255,0.6);
      text-align: center;
      padding: 32px;
      font-size: 0.8rem;
      margin-top: 60px;
    }

    @media (max-width: 768px) {
      .article-title { font-size: 1.8rem; }
      .container { padding: 24px 16px; }
      .paywall { padding: 24px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">English <span>Learning Lab</span></a>
    <a href="index.html" class="back-link">← Back</a>
  </div>
</header>

<div id="articleContainer" class="container">
  <div class="loading"><div class="spinner"></div>Loading article...</div>
</div>

<footer class="footer">
  <p>© 2024 English Learning Lab. All rights reserved.</p>
</footer>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const slug = new URLSearchParams(window.location.search).get('slug');
let currentUser = null;
let userSubscription = null;

async function init() {
  if (!slug) {
    document.getElementById('articleContainer').innerHTML = '<div class="error">Article not found</div>';
    return;
  }

  const { data: { session } } = await supabase.auth.getSession();
  currentUser = session?.user || null;

  if (currentUser) {
    const { data } = await supabase
      .from('subscriptions')
      .select('*')
      .eq('user_id', currentUser.id)
      .eq('status', 'active')
      .gt('end_date', new Date().toISOString())
      .maybeSingle();
    userSubscription = data;
  }

  await loadArticle();
}

async function loadArticle() {
  const { data: article, error } = await supabase
    .from('articles')
    .select('*')
    .eq('slug', slug)
    .eq('is_published', true)
    .maybeSingle();

  if (error || !article) {
    document.getElementById('articleContainer').innerHTML = '<div class="error">Article not found</div>';
    return;
  }

  // Increment view count
  try {
    await supabase.rpc('increment_view_count', { article_slug: slug });
  } catch(e) {}

  document.title = `${article.title} | English Learning Lab`;
  renderArticle(article);
}

function renderArticle(article) {
  const canRead = article.is_free || !!userSubscription;
  const date = new Date(article.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
  const imgUrl = article.image_url || 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=800';

  let contentHtml;
  if (canRead) {
    contentHtml = `<div class="article-content">${article.content}</div>`;
  } else {
    const plainText = article.content.replace(/<[^>]+>/g, '');
    const preview = plainText.substring(0, 400) + '...';

    contentHtml = `
      <div class="preview-blur">
        <div class="article-content">${escapeHtml(preview)}</div>
      </div>
      <div class="paywall">
        <h3>Premium Article</h3>
        <p>This article is available to premium members only.</p>
        <div class="paywall-plans">
          <div class="plan-pill selected" onclick="selectPlan('monthly')">
            <div class="plan-name">Monthly</div>
            <div class="plan-price">৳100</div>
          </div>
          <div class="plan-pill" onclick="selectPlan('yearly')">
            <div class="plan-name">Yearly</div>
            <div class="plan-price">৳1000</div>
          </div>
        </div>
        <a href="https://t.me/adamzampas" target="_blank" class="btn">Subscribe via Telegram</a>
        ${!currentUser ? '<p style="margin-top: 16px;"><a href="login.html" style="color:#e67e22;">Sign in</a> to your account</p>' : ''}
      </div>
    `;
  }

  document.getElementById('articleContainer').innerHTML = `
    <div class="article-header">
      <span class="article-tag ${article.is_free ? 'tag-free' : 'tag-premium'}">${article.is_free ? 'FREE' : 'PREMIUM'}</span>
      <h1 class="article-title">${escapeHtml(article.title)}</h1>
      <div class="article-meta">
        <span>${date}</span>
        <span>${article.view_count || 0} views</span>
      </div>
    </div>
    <img src="${imgUrl}" class="article-image" alt="${escapeHtml(article.title)}">
    ${contentHtml}
    ${canRead ? `
      <div class="share-section">
        <span>Share this article:</span>
        <a href="https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(article.title)}" target="_blank" class="share-btn">Telegram</a>
        <a href="https://wa.me/?text=${encodeURIComponent(article.title + ' ' + window.location.href)}" target="_blank" class="share-btn">WhatsApp</a>
        <button onclick="copyLink()" class="share-btn">Copy Link</button>
      </div>
    ` : ''}
  `;

  if (canRead) {
    loadMoreArticles(article.id);
  }
}

async function loadMoreArticles(currentId) {
  const { data } = await supabase
    .from('articles')
    .select('title,slug,image_url,is_free')
    .eq('is_published', true)
    .neq('id', currentId)
    .limit(4);

  if (!data || !data.length) return;

  const moreHtml = `
    <div class="more-section">
      <div class="more-title">More Articles</div>
      <div class="more-grid">
        ${data.map(a => `
          <a href="article.html?slug=${a.slug}" class="more-card">
            <img src="${a.image_url || 'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400'}" alt="">
            <div class="more-card-content">
              <div class="more-card-title">${escapeHtml(a.title)}</div>
            </div>
          </a>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('articleContainer').insertAdjacentHTML('beforeend', moreHtml);
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert('Link copied!');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, c => {
    if (c === '&') return '&amp;';
    if (c === '<') return '&lt;';
    if (c === '>') return '&gt;';
    return c;
  });
}

init();
</script>
</body>
</html>
