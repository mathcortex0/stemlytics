<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Varsity Admission Portal</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fb;
    }
    
    /* Header */
    .header {
      background: #1a1a2e;
      color: white;
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      font-size: 1.25rem;
      font-weight: 700;
    }
    
    .logout-btn {
      background: #e74c3c;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    
    /* Auth Screen */
    .auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    
    .auth-card h2 {
      margin-bottom: 8px;
    }
    
    .auth-card p {
      color: #666;
      margin-bottom: 24px;
    }
    
    .auth-error {
      background: #fee;
      color: #e74c3c;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-size: 14px;
    }
    
    .field {
      margin-bottom: 16px;
    }
    
    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 13px;
    }
    
    .field input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    
    .btn-primary {
      background: #1a73e8;
      color: white;
      width: 100%;
    }
    
    .btn-success {
      background: #27ae60;
      color: white;
    }
    
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    
    .btn-outline {
      background: transparent;
      border: 1px solid #ddd;
    }
    
    /* Main Dashboard */
    .dashboard {
      display: none;
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    
    .stat-number {
      font-size: 2rem;
      font-weight: 800;
      color: #1a73e8;
    }
    
    .stat-label {
      color: #666;
      font-size: 13px;
      margin-top: 6px;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #ddd;
      flex-wrap: wrap;
    }
    
    .tab-btn {
      padding: 12px 24px;
      background: none;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #666;
    }
    
    .tab-btn.active {
      color: #1a73e8;
      border-bottom: 2px solid #1a73e8;
      margin-bottom: -2px;
    }
    
    /* Panels */
    .panel {
      display: none;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .panel.active {
      display: block;
    }
    
    /* Forms */
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 13px;
    }
    
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    
    /* Tables */
    .data-table {
      width: 100%;
      overflow-x: auto;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    
    th {
      background: #f8f9fa;
      font-weight: 600;
    }
    
    .action-btns {
      display: flex;
      gap: 8px;
    }
    
    .action-btns button {
      padding: 4px 10px;
      font-size: 12px;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      padding: 32px;
      border-radius: 16px;
      max-width: 500px;
      width: 90%;
    }
    
    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: none;
      z-index: 1000;
    }
    
    .toast.show {
      display: block;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
      .dashboard { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- Auth Screen -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <h2>🔐 Admin Access</h2>
    <p>Sign in to manage admission portal</p>
    <div id="authError" class="auth-error"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="adminEmail" placeholder="admin@example.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="adminPassword" placeholder="Password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
  <div class="header" style="margin: -24px -24px 24px -24px; border-radius: 0;">
    <div class="logo">📚 Varsity Admission Admin</div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>
  
  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-number" id="statUnis">0</div><div class="stat-label">Universities</div></div>
    <div class="stat-card"><div class="stat-number" id="statCirculars">0</div><div class="stat-label">Circulars</div></div>
    <div class="stat-card"><div class="stat-number" id="statNotifs">0</div><div class="stat-label">Notifications</div></div>
    <div class="stat-card"><div class="stat-number" id="statResources">0</div><div class="stat-label">Resources</div></div>
  </div>
  
  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="universities">🏛️ Universities</button>
    <button class="tab-btn" data-tab="circulars">📢 Admission Circulars</button>
    <button class="tab-btn" data-tab="notifications">🔔 Notifications</button>
    <button class="tab-btn" data-tab="resources">📚 Resources</button>
  </div>
  
  <!-- Universities Panel -->
  <div id="universitiesPanel" class="panel active">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>Manage Universities</h3>
      <button class="btn btn-success" onclick="openUniModal()">+ Add University</button>
    </div>
    <div class="data-table" id="unisTable"></div>
  </div>
  
  <!-- Circulars Panel -->
  <div id="circularsPanel" class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>Admission Circulars</h3>
      <button class="btn btn-success" onclick="openCircularModal()">+ Add Circular</button>
    </div>
    <div class="data-table" id="circularsTable"></div>
  </div>
  
  <!-- Notifications Panel -->
  <div id="notificationsPanel" class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>Notifications</h3>
      <button class="btn btn-success" onclick="openNotifModal()">+ Add Notification</button>
    </div>
    <div class="data-table" id="notifsTable"></div>
  </div>
  
  <!-- Resources Panel -->
  <div id="resourcesPanel" class="panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3>Resources & Materials</h3>
      <button class="btn btn-success" onclick="openResourceModal()">+ Add Resource</button>
    </div>
    <div class="data-table" id="resourcesTable"></div>
  </div>
</div>

<!-- University Modal -->
<div id="uniModal" class="modal">
  <div class="modal-content">
    <h3 id="uniModalTitle">Add University</h3>
    <input type="hidden" id="uniId">
    <div class="form-group">
      <label>University Name</label>
      <input type="text" id="uniName" placeholder="e.g., University of Dhaka">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="uniCategory">
        <option value="Varsity">🎓 Varsity</option>
        <option value="Engineering">⚙️ Engineering</option>
        <option value="Medical">🩺 Medical</option>
      </select>
    </div>
    <div class="form-group">
      <label>Logo URL (optional)</label>
      <input type="text" id="uniLogo" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="uniDesc" placeholder="University description..."></textarea>
    </div>
    <div class="form-group">
      <label>Website</label>
      <input type="text" id="uniWebsite" placeholder="https://...">
    </div>
    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeUniModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUniversity()">Save</button>
    </div>
  </div>
</div>

<!-- Circular Modal -->
<div id="circularModal" class="modal">
  <div class="modal-content">
    <h3 id="circularModalTitle">Add Circular</h3>
    <input type="hidden" id="circularId">
    <div class="form-group">
      <label>University</label>
      <select id="circularUniId"></select>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="circularTitle" placeholder="e.g., Admission 2024-25">
    </div>
    <div class="form-group">
      <label>Circular Link</label>
      <input type="text" id="circularLink" placeholder="https://...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Application Deadline</label>
        <input type="date" id="circularDeadline">
      </div>
      <div class="form-group">
        <label>Exam Date</label>
        <input type="date" id="circularExamDate">
      </div>
    </div>
    <div class="form-group">
      <label>Exam Date Text (optional)</label>
      <input type="text" id="circularExamText" placeholder="e.g., To be announced">
    </div>
    <div class="form-group">
      <label>Details</label>
      <textarea id="circularDetails" placeholder="Additional details..."></textarea>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="circularFeatured"> Featured on homepage</label>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeCircularModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCircular()">Save</button>
    </div>
  </div>
</div>

<!-- Notification Modal -->
<div id="notifModal" class="modal">
  <div class="modal-content">
    <h3 id="notifModalTitle">Add Notification</h3>
    <input type="hidden" id="notifId">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="notifTitle" placeholder="Notification title">
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="notifMessage" placeholder="Notification message..."></textarea>
    </div>
    <div class="form-group">
      <label>Link (optional)</label>
      <input type="text" id="notifLink" placeholder="https://...">
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="notifUrgent"> Urgent (red highlight)</label>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="notifShowHome" checked> Show on homepage</label>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeNotifModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNotification()">Save</button>
    </div>
  </div>
</div>

<!-- Resource Modal -->
<div id="resourceModal" class="modal">
  <div class="modal-content">
    <h3 id="resourceModalTitle">Add Resource</h3>
    <input type="hidden" id="resourceId">
    <div class="form-group">
      <label>University</label>
      <select id="resourceUniId"></select>
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="resourceTitle" placeholder="e.g., Admission Guide 2024">
    </div>
    <div class="form-group">
      <label>Resource Type</label>
      <select id="resourceType">
        <option value="PDF">📄 PDF</option>
        <option value="Link">🔗 Link</option>
        <option value="Notice">📢 Notice</option>
        <option value="Syllabus">📖 Syllabus</option>
        <option value="Question Bank">📝 Question Bank</option>
      </select>
    </div>
    <div class="form-group">
      <label>File URL</label>
      <input type="text" id="resourceUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="resourceDesc" placeholder="Description..."></textarea>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-outline" onclick="closeResourceModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveResource()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';

let supabase;
let currentUser = null;

// ========== AUTH ==========
async function doLogin() {
  const email = document.getElementById('adminEmail').value;
  const password = document.getElementById('adminPassword').value;
  const errDiv = document.getElementById('authError');
  
  if (!email || !password) {
    errDiv.textContent = 'Email and password required';
    errDiv.style.display = 'block';
    return;
  }
  
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    errDiv.textContent = error.message;
    errDiv.style.display = 'block';
    return;
  }
  
  currentUser = data.user;
  
  // Verify admin email
  if (currentUser.email !== 'text.me.md.alamin@gmail.com') {
    await supabase.auth.signOut();
    errDiv.textContent = 'You are not authorized as admin';
    errDiv.style.display = 'block';
    return;
  }
  
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadAllData();
}

async function doLogout() {
  await supabase.auth.signOut();
  location.reload();
}

// ========== LOAD ALL DATA ==========
async function loadAllData() {
  await Promise.all([
    loadUniversities(),
    loadCirculars(),
    loadNotifications(),
    loadResources()
  ]);
  updateStats();
}

async function loadUniversities() {
  const { data } = await supabase.from('universities').select('*').order('name');
  window.unis = data || [];
  renderUniversities();
}

function renderUniversities() {
  const container = document.getElementById('unisTable');
  if (!window.unis || window.unis.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:40px;">No universities yet. Add one!</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead><tr><th>Name</th><th>Category</th><th>Actions</th></tr></thead>
      <tbody>
        ${window.unis.map(uni => `
          <tr>
            <td><strong>${escapeHtml(uni.name)}</strong><br><small>${escapeHtml(uni.description?.substring(0, 60)) || ''}</small></td>
            <td>${uni.category}</td>
            <td class="action-btns">
              <button class="btn btn-outline" onclick="editUni(${uni.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteUni(${uni.id}, '${escapeHtml(uni.name)}')">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function loadCirculars() {
  const { data } = await supabase.from('admission_circulars').select('*, universities(name)').order('created_at', { ascending: false });
  window.circulars = data || [];
  renderCirculars();
}

function renderCirculars() {
  const container = document.getElementById('circularsTable');
  if (!window.circulars || window.circulars.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:40px;">No circulars yet. Add one!</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead><tr><th>University</th><th>Title</th><th>Deadline</th><th>Featured</th><th>Actions</th></tr></thead>
      <tbody>
        ${window.circulars.map(c => `
          <tr>
            <td>${escapeHtml(c.universities?.name || 'Unknown')}</td>
            <td>${escapeHtml(c.title)}</td>
            <td>${c.application_deadline ? new Date(c.application_deadline).toLocaleDateString() : 'TBA'}</td>
            <td>${c.is_featured ? '⭐ Yes' : 'No'}</td>
            <td class="action-btns">
              <button class="btn btn-outline" onclick="editCircular(${c.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteCircular(${c.id})">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function loadNotifications() {
  const { data } = await supabase.from('notifications').select('*').order('created_at', { ascending: false });
  window.notifications = data || [];
  renderNotifications();
}

function renderNotifications() {
  const container = document.getElementById('notifsTable');
  if (!window.notifications || window.notifications.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:40px;">No notifications yet. Add one!</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead><tr><th>Title</th><th>Message</th><th>Urgent</th><th>On Homepage</th><th>Actions</th></tr></thead>
      <tbody>
        ${window.notifications.map(n => `
          <tr>
            <td><strong>${escapeHtml(n.title)}</strong></td>
            <td>${escapeHtml(n.message.substring(0, 60))}${n.message.length > 60 ? '...' : ''}</td>
            <td>${n.is_urgent ? '🔴 Yes' : 'No'}</td>
            <td>${n.show_on_homepage ? '✅ Yes' : 'No'}</td>
            <td class="action-btns">
              <button class="btn btn-outline" onclick="editNotif(${n.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteNotif(${n.id})">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function loadResources() {
  const { data } = await supabase.from('resources').select('*, universities(name)').order('created_at', { ascending: false });
  window.resources = data || [];
  renderResources();
}

function renderResources() {
  const container = document.getElementById('resourcesTable');
  if (!window.resources || window.resources.length === 0) {
    container.innerHTML = '<p style="text-align:center; padding:40px;">No resources yet. Add one!</p>';
    return;
  }
  
  container.innerHTML = `
    <table>
      <thead><tr><th>University</th><th>Title</th><th>Type</th><th>Actions</th></tr></thead>
      <tbody>
        ${window.resources.map(r => `
          <tr>
            <td>${escapeHtml(r.universities?.name || 'Unknown')}</td>
            <td>${escapeHtml(r.title)}</td>
            <td>${r.resource_type}</td>
            <td class="action-btns">
              <button class="btn btn-outline" onclick="editResource(${r.id})">Edit</button>
              <button class="btn btn-danger" onclick="deleteResource(${r.id})">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function updateStats() {
  document.getElementById('statUnis').textContent = window.unis?.length || 0;
  document.getElementById('statCirculars').textContent = window.circulars?.length || 0;
  document.getElementById('statNotifs').textContent = window.notifications?.length || 0;
  document.getElementById('statResources').textContent = window.resources?.length || 0;
}

// ========== CRUD Operations ==========
async function saveUniversity() {
  const id = document.getElementById('uniId').value;
  const data = {
    name: document.getElementById('uniName').value,
    category: document.getElementById('uniCategory').value,
    logo_url: document.getElementById('uniLogo').value || null,
    description: document.getElementById('uniDesc').value || null,
    website: document.getElementById('uniWebsite').value || null
  };
  
  let result;
  if (id) {
    result = await supabase.from('universities').update(data).eq('id', id);
  } else {
    result = await supabase.from('universities').insert([data]);
  }
  
  if (result.error) {
    showToast('Error: ' + result.error.message);
  } else {
    showToast(id ? 'University updated!' : 'University added!');
    closeUniModal();
    loadUniversities();
    updateStats();
  }
}

async function deleteUni(id, name) {
  if (!confirm(`Delete "${name}"? This will also delete all circulars and resources for this university.`)) return;
  
  const { error } = await supabase.from('universities').delete().eq('id', id);
  if (error) {
    showToast('Error: ' + error.message);
  } else {
    showToast('University deleted');
    loadUniversities();
    loadCirculars();
    loadResources();
    updateStats();
  }
}

// Similar functions for circulars, notifications, resources...

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active');
  });
});

function openCircularModal() { 
  // Populate university dropdown
  const select = document.getElementById('circularUniId');
  select.innerHTML = (window.unis || []).map(u => `<option value="${u.id}">${escapeHtml(u.name)}</option>`).join('');

}
