<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>Admin Control Panel</h1>
        
        <section class="payment-box">
            <h3>Add New Course</h3>
            <form id="course-form" style="display: grid; gap: 10px;">
                <input type="text" id="cTitle" placeholder="Course Name" required>
                <input type="number" id="cPrice" placeholder="Price" required>
                <input type="text" id="cTG" placeholder="Telegram Link" required>
                <textarea id="cDesc" placeholder="Description"></textarea>
                <input type="file" id="cFile" accept="image/*" required>
                <button type="submit" id="addBtn" class="btn-primary">Upload & Publish</button>
            </form>
        </section>

        <h3>Recent Orders</h3>
        <table style="width: 100%; border-collapse: collapse; background: white;">
            <thead>
                <tr style="background: #eee;">
                    <th>User</th><th>Course</th><th>TrxID</th><th>Status</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="order-list"></tbody>
        </table>
    </div>
    <script src="script.js"></script>
    <script>
        // Admin specific start
        if(document.getElementById('order-list')) {
            window.onload = fetchOrders;
        }
    </script>
</body>
</html>
