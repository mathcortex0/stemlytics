<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Latest Posts</title>
  <meta name="description" content="Latest articles and updates">
  <meta name="robots" content="index, follow">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #fafaf8;
      color: #1a1a1a;
      line-height: 1.5;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    
    /* Header */
    .header {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
      background: rgba(255,255,255,0.95);
    }
    
    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
    }
    
    .admin-link {
      color: #666;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    .admin-link:hover {
      background: #f0f0f0;
      color: #1a1a2e;
    }
    
    /* Hero */
    .hero {
      text-align: center;
      padding: 64px 0 48px;
      background: linear-gradient(135deg, #f5f5f0 0%, #ffffff 100%);
    }
    
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #1a1a2e, #2c3e50);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .hero p {
      color: #666;
      font-size: 1.125rem;
      max-width: 600px;
      margin: 0 auto;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 32px 0 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e5e5;
    }
    
    .filter-btn {
      background: none;
      border: none;
      padding: 8px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
      color: #666;
    }
    
    .filter-btn:hover {
      background: #f0f0f0;
    }
    
    .filter-btn.active {
      background: #1a1a2e;
      color: white;
    }
    
    /* Post Grid */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 32px;
      padding: 24px 0 64px;
    }
    
    .post-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    
    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.1);
    }
    
    .post-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .post-content {
      padding: 20px;
    }
    
    .post-category {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #e74c3c;
      margin-bottom: 8px;
    }
    
    .post-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    
    .post-excerpt {
      color: #666;
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 12px;
    }
    
    .post-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: #999;
    }
    
    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      padding: 32px;
      border-top: 1px solid #e5e5e5;
      color: #999;
      font-size: 0.875rem;
    }
    
    @media (max-width: 768px) {
      .hero h1 { font-size: 2rem; }
      .posts-grid { grid-template-columns: 1fr; }
      .container { padding: 0 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">Blog</a>
      <a href="admin.html" class="admin-link">Admin →</a>
    </div>
  </div>
</header>

<section class="hero">
  <div class="container">
    <h1>Latest Stories</h1>
    <p>Insights, ideas, and updates from our team</p>
  </div>
</section>

<main class="container">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="">All</button>
    <button class="filter-btn" data-cat="Technology">Technology</button>
    <button class="filter-btn" data-cat="Business">Business</button>
    <button class="filter-btn" data-cat="Design">Design</button>
    <button class="filter-btn" data-cat="Culture">Culture</button>
  </div>
  
  <div class="posts-grid" id="postsGrid">
    <!-- Skeletons -->
    <div class="skeleton" style="height: 380px; border-radius: 16px;"></div>
    <div class="skeleton" style="height: 380px; border-radius: 16px;"></div>
    <div class="skeleton" style="height: 380px; border-radius: 16px;"></div>
  </div>
</main>

<footer class="footer">
  <p>© 2024 Blog. All rights reserved.</p>
</footer>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';

let allPosts = [];
let activeCategory = '';

async function loadPosts() {
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data, error } = await sb
    .from('posts')
    .select('*')
    .eq('is_published', true)
    .order('created_at', { ascending: false });
  
  if (error) {
    console.error('Error loading posts:', error);
    return;
  }
  
  allPosts = data || [];
  renderPosts();
}

function renderPosts() {
  const grid = document.getElementById('postsGrid');
  let filtered = activeCategory 
    ? allPosts.filter(p => p.category === activeCategory)
    : allPosts;
  
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">No posts found.</div>';
    return;
  }
  
  grid.innerHTML = filtered.map(post => `
    <a href="post.html?id=${post.id}" class="post-card">
      ${post.image_url ? `<img src="${post.image_url}" class="post-image" alt="${escapeHtml(post.title)}">` : ''}
      <div class="post-content">
        <div class="post-category">${escapeHtml(post.category || 'General')}</div>
        <h2 class="post-title">${escapeHtml(post.title)}</h2>
        <p class="post-excerpt">${escapeHtml(post.excerpt || post.content.substring(0, 120))}...</p>
        <div class="post-meta">
          <span>${escapeHtml(post.author || 'Admin')}</span>
          <span>${formatDate(post.created_at)}</span>
        </div>
      </div>
    </a>
  `).join('');
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

// Filter handling
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderPosts();
  });
});

loadPosts();
</script>
</body>
</html>
