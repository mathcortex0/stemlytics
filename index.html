<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Varsity Admission Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .logo h1 { font-size: 1.5rem; }
    .logo p { font-size: 0.8rem; opacity: 0.8; }
    
    .notification-bell {
      position: relative;
      cursor: pointer;
      font-size: 24px;
    }
    
    .badge {
      position: absolute;
      top: -8px;
      right: -12px;
      background: #e74c3c;
      color: white;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 10px;
      display: none;
    }
    
    .notification-panel {
      position: absolute;
      top: 70px;
      right: 20px;
      width: 320px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: none;
      z-index: 1000;
      max-height: 400px;
      overflow-y: auto;
    }
    
    .notification-panel.show {
      display: block;
    }
    
    .notification-item {
      padding: 15px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    
    .notification-item.urgent {
      border-left: 3px solid #e74c3c;
      background: #fff5f5;
    }
    
    /* Categories */
    .categories {
      display: flex;
      gap: 12px;
      padding: 24px 32px;
      flex-wrap: wrap;
      background: white;
      margin: 20px;
      border-radius: 12px;
    }
    
    .cat-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 30px;
      background: #e0e0e0;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    
    .cat-btn.active {
      background: #1a1a2e;
      color: white;
    }
    
    /* University Cards */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    
    .unis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
    }
    
    .uni-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .uni-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    
    .card-header {
      padding: 30px;
      text-align: center;
      color: white;
    }
    
    .card-header.Varsity { background: linear-gradient(135deg, #1a73e8, #0d47a1); }
    .card-header.Engineering { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .card-header.Medical { background: linear-gradient(135deg, #27ae60, #1e8449); }
    
    .uni-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-top: 10px;
    }
    
    .card-body {
      padding: 20px;
    }
    
    .deadline {
      background: #fee;
      color: #e74c3c;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    
    .btn-link {
      display: inline-block;
      margin-top: 12px;
      padding: 8px 16px;
      background: #1a73e8;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }
    
    .footer {
      text-align: center;
      padding: 30px;
      background: #1a1a2e;
      color: #888;
      margin-top: 40px;
    }
    
    @media (max-width: 768px) {
      .categories { margin: 10px; }
      .unis-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <h1>📚 Varsity Admission</h1>
    <p>Your Gateway to Higher Education</p>
  </div>
  <div class="notification-bell" id="bellBtn">
    🔔
    <span class="badge" id="notifBadge">0</span>
  </div>
</div>

<div class="notification-panel" id="notifPanel">
  <div style="padding: 12px; background: #f5f5f5; font-weight: bold; border-bottom: 1px solid #ddd;">Notifications</div>
  <div id="notifList">Loading...</div>
</div>

<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="">All</button>
  <button class="cat-btn" data-cat="Varsity">🎓 Varsity</button>
  <button class="cat-btn" data-cat="Engineering">⚙️ Engineering</button>
  <button class="cat-btn" data-cat="Medical">🩺 Medical</button>
</div>

<div class="container">
  <div class="unis-grid" id="unisGrid">
    <div class="loading">Loading universities...</div>
  </div>
</div>

<footer class="footer">
  <p>© 2024 Varsity Admission Portal | All rights reserved</p>
  <p><a href="admin.html" style="color: #888;">Admin Login</a></p>
</footer>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';

let supabase;
let allUniversities = [];
let currentCategory = '';

// Initialize Supabase
async function init() {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  await loadUniversities();
  await loadNotifications();
}

// Load universities
async function loadUniversities() {
  try {
    let query = supabase.from('universities').select('*');
    
    if (currentCategory) {
      query = query.eq('category', currentCategory);
    }
    
    const { data, error } = await query;
    
    if (error) throw error;
    
    allUniversities = data || [];
    renderUniversities();
  } catch (err) {
    console.error('Error:', err);
    document.getElementById('unisGrid').innerHTML = `<div class="loading">Error loading: ${err.message}</div>`;
  }
}

// Render universities
function renderUniversities() {
  const grid = document.getElementById('unisGrid');
  
  if (allUniversities.length === 0) {
    grid.innerHTML = '<div class="loading">No universities found.</div>';
    return;
  }
  
  grid.innerHTML = allUniversities.map(uni => `
    <div class="uni-card" onclick="viewUniversity(${uni.id})">
      <div class="card-header ${uni.category}">
        <div class="uni-name">${escapeHtml(uni.name)}</div>
        <div style="font-size: 12px; margin-top: 5px;">${uni.category}</div>
      </div>
      <div class="card-body">
        <p style="color: #666; font-size: 14px;">${escapeHtml(uni.description?.substring(0, 100) || 'No description')}</p>
        <a href="#" class="btn-link" onclick="event.stopPropagation();viewUniversity(${uni.id})">View Details →</a>
      </div>
    </div>
  `).join('');
}

// Load notifications
async function loadNotifications() {
  try {
    const { data, error } = await supabase
      .from('notifications')
      .select('*')
      .eq('is_published', true)
      .eq('show_on_homepage', true)
      .order('created_at', { ascending: false });
    
    if (error) throw error;
    
    const notifs = data || [];
    const unreadCount = notifs.filter(n => !localStorage.getItem(`read_${n.id}`)).length;
    
    const badge = document.getElementById('notifBadge');
    if (unreadCount > 0) {
      badge.textContent = unreadCount;
      badge.style.display = 'inline-block';
    } else {
      badge.style.display = 'none';
    }
    
    const container = document.getElementById('notifList');
    if (notifs.length === 0) {
      container.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No notifications</div>';
    } else {
      container.innerHTML = notifs.map(n => `
        <div class="notification-item ${n.is_urgent ? 'urgent' : ''}" onclick="markRead(${n.id}, '${n.link || ''}')">
          <div style="font-weight: 600;">${escapeHtml(n.title)}</div>
          <div style="font-size: 13px; color: #666; margin-top: 5px;">${escapeHtml(n.message)}</div>
          <div style="font-size: 11px; color: #999; margin-top: 8px;">${timeAgo(n.created_at)}</div>
        </div>
      `).join('');
    }
  } catch (err) {
    console.error('Notif error:', err);
  }
}

function markRead(id, link) {
  localStorage.setItem(`read_${id}`, 'true');
  if (link) window.open(link, '_blank');
  loadNotifications();
  document.getElementById('notifPanel').classList.remove('show');
}

function viewUniversity(id) {
  window.location.href = `university.html?id=${id}`;
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins} min ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
  const days = Math.floor(hours / 24);
  return `${days} day${days > 1 ? 's' : ''} ago`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}

// Category filter
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    loadUniversities();
  });
});

// Notification bell
document.getElementById('bellBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('notifPanel').classList.toggle('show');
});

document.addEventListener('click', () => {
  document.getElementById('notifPanel').classList.remove('show');
});

// Start
init();
</script>
</body>
</html>
