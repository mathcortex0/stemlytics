<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varsity Admission</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; margin: 0; color: #0B1F3A; }
        header { background: #0B1F3A; color: #C9A84C; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #C9A84C; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .apply-btn { display: inline-block; background: #0B1F3A; color: #C9A84C; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <header><h1>Varsity Admission</h1></header>
    <div class="container" id="list">Loading...</div>

    <script>
        async function fetchNotices() {
            const res = await fetch('/api/notices');
            const data = await res.json();
            const list = document.getElementById('list');
            list.innerHTML = data.map(n => `
                <div class="card">
                    <h3>${n.uni_name} (${n.unit_name})</h3>
                    <p>Exam: ${n.exam_date} <br> Deadline: ${n.apply_deadline}</p>
                    <small>${n.important_note}</small> <br>
                    <a href="${n.apply_link}" class="apply-btn" target="_blank">Apply Now</a>
                </div>
            `).join('') || "No updates found.";
        }
        fetchNotices();
    </script>
</body>
</html>
