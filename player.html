<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Academy - Video Player</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
    <div class="logo">📚 Nexora Academy</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="player.html" class="active">My Courses</a>
    </div>
    <div class="auth-buttons">
        <span id="userEmailPlayer"></span>
        <button id="logoutBtnPlayer" class="btn-outline">Logout</button>
    </div>
</nav>

<div class="player-container">
    <div class="player-sidebar">
        <h3>📚 My Courses Content</h3>
        <div id="contentTree" class="content-tree">
            <div class="loading">Loading your courses...</div>
        </div>
    </div>

    <div class="player-main">
        <div id="videoContainer">
            <div class="lecture-placeholder">
                <h2>🎬 Select a lecture from the sidebar</h2>
                <p>Your enrolled courses will appear here</p>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
