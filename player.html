<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Stemlytics · Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="/css/stemlytics.css">
<style>
  /* Player specific styles - same as your original player */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 24px 16px;
    gap: 16px;
  }
  
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  
  .body {
    display: flex;
    gap: 16px;
    flex: 1;
    min-height: 0;
  }
  
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--charcoal);
    border-radius: 14px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .sidebar-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  
  .track-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }
  
  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 4px;
  }
  
  .track-item:hover { background: var(--navy-light); }
  .track-item.active {
    background: var(--gold-dim);
    border: 1px solid rgba(255,215,0,0.2);
  }
  
  .track-thumb {
    width: 52px;
    height: 32px;
    border-radius: 5px;
    background: #1a2030;
    flex-shrink: 0;
    object-fit: cover;
  }
  
  .track-info { flex: 1; min-width: 0; }
  .track-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--gray-light);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  
  .player-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  
  #yt-player {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  
  .thumb-cover {
    position: absolute; inset: 0; z-index: 50;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  
  .thumb-cover.gone { opacity: 0; pointer-events: none; }
  
  .thumb-bg {
    position: absolute; inset: 0;
    object-fit: cover; width: 100%; height: 100%;
    opacity: 0.45;
  }
  
  .thumb-play {
    position: relative; z-index: 2;
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--gold);
    display: flex; align-items: center; justify-content: center;
  }
  
  .ctrl-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 20px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  
  .player-wrap:hover .ctrl-bar { opacity: 1; }
  
  .prog-wrap {
    width: 100%; height: 18px;
    display: flex; align-items: center;
    margin-bottom: 10px;
    cursor: pointer;
  }
  
  .prog-track {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    position: relative;
  }
  
  .prog-fill {
    height: 100%; width: 0%;
    background: var(--gold);
    border-radius: 2px;
  }
  
  .ctrl-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  .ctrl-left, .ctrl-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .ibtn {
    background: transparent; border: none;
    color: rgba(255,255,255,0.85);
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  
  .ibtn:hover { background: rgba(255,255,255,0.12); color: var(--gold); }
  
  .time-disp {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.85);
    min-width: 96px;
    font-variant-numeric: tabular-nums;
  }
  
  .lecture-info {
    background: var(--charcoal);
    border-radius: 12px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  
  @media (max-width: 860px) {
    .body { flex-direction: column; }
    .sidebar { width: 100%; height: 200px; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <div class="flex items-center gap-3">
      <div class="w-2.5 h-2.5 bg-gold rounded-full animate-pulse"></div>
      <span class="text-xl font-bold font-syne" id="courseTitle">Stemlytics</span>
    </div>
    <button onclick="window.location.href='/'" class="text-gray-400 hover:text-white">
      <i class="fas fa-home mr-2"></i>Catalog
    </button>
  </div>

  <div class="body">
    <div class="sidebar">
      <div class="sidebar-head">
        <h2 class="font-bold font-syne" id="sidebarTitle">Course Lectures</h2>
        <p class="text-sm text-gray-400" id="lectureCount">Loading...</p>
      </div>
      <div class="track-list" id="trackList"></div>
    </div>

    <div class="main">
      <div class="player-wrap" id="playerWrap">
        <div id="yt-player"></div>
        <div class="thumb-cover" id="thumbCover">
          <img src="" id="thumbBg" class="thumb-bg" alt="">
          <div class="thumb-play"><i class="fas fa-play text-3xl text-navy"></i></div>
        </div>
        <div class="ctrl-bar">
          <div class="prog-wrap" id="progWrap">
            <div class="prog-track" id="progTrack">
              <div class="prog-fill" id="progFill"></div>
            </div>
          </div>
          <div class="ctrl-row">
            <div class="ctrl-left">
              <button class="ibtn" id="playBtn"><i class="fas fa-play"></i></button>
              <button class="ibtn" id="rewBtn"><i class="fas fa-rotate-left"></i></button>
              <button class="ibtn" id="fwdBtn"><i class="fas fa-rotate-right"></i></button>
              <span class="time-disp" id="timeDisp">00:00 / 00:00</span>
            </div>
            <div class="ctrl-right">
              <button class="ibtn" id="fsBtn"><i class="fas fa-expand"></i></button>
            </div>
          </div>
        </div>
      </div>

      <div class="lecture-info">
        <div>
          <h3 class="font-bold font-syne" id="lecTitle">Select a lecture</h3>
          <p class="text-sm text-gray-400" id="lecMeta"></p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
  import { sb, auth, checkAccess } from './js/supabase.js';

  let player, lectures = [], curIdx = 0;
  const urlParams = new URLSearchParams(window.location.search);
  const courseId = urlParams.get('id');

  // Check access first
  const hasAccess = await checkAccess(courseId);
  if (!hasAccess) {
    document.body.innerHTML = `
      <div class="shell" style="justify-content:center;align-items:center">
        <div class="text-center">
          <i class="fas fa-lock text-6xl text-gold/50 mb-6"></i>
          <h2 class="text-2xl font-bold mb-4">Access Restricted</h2>
          <p class="text-gray-400 mb-6">You don't have access to this course</p>
          <a href="/" class="bg-gold text-navy px-6 py-3 rounded-lg font-bold">Back to Catalog</a>
        </div>
      </div>
    `;
    throw new Error('Access denied');
  }

  // Load course and lectures
  const { data: course } = await sb.from('courses').select('*').eq('id', courseId).single();
  document.getElementById('courseTitle').textContent = course.title;
  document.getElementById('sidebarTitle').textContent = course.title;

  const { data: lecturesData } = await sb
    .from('lectures')
    .select('*')
    .eq('course_id', courseId)
    .order('order_index', { ascending: true });

  lectures = lecturesData || [];
  document.getElementById('lectureCount').textContent = `${lectures.length} lectures`;

  // Build sidebar
  const trackList = document.getElementById('trackList');
  trackList.innerHTML = lectures.map((lec, i) => `
    <div class="track-item ${i === 0 ? 'active' : ''}" data-index="${i}">
      <span class="text-xs text-gray-500 w-6">${String(i+1).padStart(2,'0')}</span>
      <img class="track-thumb" src="https://img.youtube.com/vi/${lec.youtube_embed_id}/mqdefault.jpg">
      <div class="track-info">
        <div class="track-title">${lec.title}</div>
        <div class="text-xs text-gray-500">${lec.description || ''}</div>
      </div>
    </div>
  `).join('');

  // Initialize YouTube Player
  window.onYouTubeIframeAPIReady = () => {
    player = new YT.Player('yt-player', {
      height: '100%',
      width: '100%',
      videoId: lectures[0]?.youtube_embed_id,
      playerVars: {
        autoplay: 0,
        controls: 0,
        rel: 0,
        modestbranding: 1,
        fs: 0,
        disablekb: 1
      },
      events: {
        onReady: () => {
          if (lectures[0]) {
            document.getElementById('thumbBg').src = `https://img.youtube.com/vi/${lectures[0].youtube_embed_id}/maxresdefault.jpg`;
            document.getElementById('lecTitle').textContent = lectures[0].title;
            document.getElementById('lecMeta').textContent = lectures[0].description || '';
          }
          setInterval(updateProgress, 100);
        },
        onStateChange: (e) => {
          if (e.data === YT.PlayerState.PLAYING) {
            document.getElementById('thumbCover').classList.add('gone');
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
          } else {
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
          }
        }
      }
    });
  };

  function updateProgress() {
    if (player && player.getCurrentTime) {
      const cur = player.getCurrentTime() || 0;
      const dur = player.getDuration() || 1;
      document.getElementById('progFill').style.width = `${(cur/dur)*100}%`;
      document.getElementById('timeDisp').textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
    }
  }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  // Event Listeners
  document.getElementById('playBtn').addEventListener('click', () => {
    player?.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
  });

  document.getElementById('rewBtn').addEventListener('click', () => {
    player?.seekTo(player.getCurrentTime() - 10, true);
  });

  document.getElementById('fwdBtn').addEventListener('click', () => {
    player?.seekTo(player.getCurrentTime() + 10, true);
  });

  document.getElementById('fsBtn').addEventListener('click', () => {
    document.getElementById('playerWrap').requestFullscreen();
  });

  document.getElementById('progWrap').addEventListener('click', (e) => {
    const rect = document.getElementById('progTrack').getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    player?.seekTo(pct * player.getDuration(), true);
  });

  document.getElementById('thumbCover').addEventListener('click', () => {
    player?.playVideo();
  });

  trackList.addEventListener('click', (e) => {
    const item = e.target.closest('.track-item');
    if (item) {
      const idx = parseInt(item.dataset.index);
      loadLecture(idx);
    }
  });

  function loadLecture(idx) {
    curIdx = idx;
    const lec = lectures[idx];
    
    document.querySelectorAll('.track-item').forEach((el, i) => {
      el.classList.toggle('active', i === idx);
    });
    
    document.getElementById('lecTitle').textContent = lec.title;
    document.getElementById('lecMeta').textContent = lec.description || '';
    document.getElementById('thumbBg').src = `https://img.youtube.com/vi/${lec.youtube_embed_id}/maxresdefault.jpg`;
    document.getElementById('thumbCover').classList.remove('gone');
    
    player?.loadVideoById(lec.youtube_embed_id);
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      document.getElementById('playBtn').click();
    } else if (e.code === 'ArrowLeft') {
      e.preventDefault();
      document.getElementById('rewBtn').click();
    } else if (e.code === 'ArrowRight') {
      e.preventDefault();
      document.getElementById('fwdBtn').click();
    }
  });
</script>
</body>
</html>
