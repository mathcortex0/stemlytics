<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | English Learning Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    
    .auth-container h2 {
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    
    .auth-container p {
      color: #666;
      margin-bottom: 30px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 13px;
      color: #333;
    }
    
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    
    .error {
      background: #fee;
      color: #e74c3c;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-size: 14px;
    }
    
    .success {
      background: #e8f5e9;
      color: #27ae60;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: none;
      font-size: 14px;
    }
    
    .divider {
      text-align: center;
      margin: 20px 0;
      color: #999;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #ddd;
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>
<body>

<div class="auth-container">
  <h2>Welcome Back</h2>
  <p>Sign in to access premium content</p>
  
  <div id="errorMsg" class="error"></div>
  <div id="successMsg" class="success"></div>
  
  <div id="loginForm">
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
  </div>
  
  <div class="divider">or</div>
  
  <div id="signupForm">
    <div class="input-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="Your full name">
    </div>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="your@email.com">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Create a password">
    </div>
    <button class="btn btn-secondary" onclick="doSignup()">Create Account</button>
  </div>
  
  <div class="back-link">
    <a href="index.html">← Back to Home</a>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';

let supabase;

async function init() {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  // Check if already logged in
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    window.location.href = 'admin.html';
  }
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const errDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  
  errDiv.style.display = 'none';
  successDiv.style.display = 'none';
  
  if (!email || !password) {
    errDiv.textContent = 'Please enter email and password';
    errDiv.style.display = 'block';
    return;
  }
  
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  
  if (error) {
    errDiv.textContent = error.message;
    errDiv.style.display = 'block';
  } else {
    successDiv.textContent = 'Login successful! Redirecting...';
    successDiv.style.display = 'block';
    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 1000);
  }
}

async function doSignup() {
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;
  const errDiv = document.getElementById('errorMsg');
  const successDiv = document.getElementById('successMsg');
  
  errDiv.style.display = 'none';
  successDiv.style.display = 'none';
  
  if (!name || !email || !password) {
    errDiv.textContent = 'Please fill all fields';
    errDiv.style.display = 'block';
    return;
  }
  
  if (password.length < 6) {
    errDiv.textContent = 'Password must be at least 6 characters';
    errDiv.style.display = 'block';
    return;
  }
  
  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { data: { full_name: name } }
  });
  
  if (error) {
    errDiv.textContent = error.message;
    errDiv.style.display = 'block';
  } else {
    successDiv.textContent = 'Account created! Please contact @adamzampas on Telegram to activate premium subscription.';
    successDiv.style.display = 'block';
    
    // Clear form
    document.getElementById('signupName').value = '';
    document.getElementById('signupEmail').value = '';
    document.getElementById('signupPassword').value = '';
  }
}

init();
</script>
</body>
</html>
