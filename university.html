<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>University Details</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f7fb;
    }
    
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: white;
      padding: 16px 32px;
    }
    
    .back-link {
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px;
    }
    
    .university-header {
      background: white;
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .university-name {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    
    .category-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    
    .category-badge.varsity { background: #1a73e8; color: white; }
    .category-badge.engineering { background: #f39c12; color: white; }
    .category-badge.medical { background: #27ae60; color: white; }
    
    .section {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .section h3 {
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid #eee;
    }
    
    .circular-card {
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .resource-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #eee;
    }
    
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }
    
    .btn-primary {
      background: #1a73e8;
      color: white;
    }
    
    .deadline-warning {
      background: #fee;
      color: #e74c3c;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    
    @media (max-width: 768px) {
      .container { padding: 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="back-link">← Back to Home</a>
</header>

<div class="container" id="content">
  <div style="text-align:center; padding:60px;">Loading...</div>
</div>

<script>
const SUPABASE_URL = 'https://noekogokjjptosipfile.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TQRMwY2EqtZgAoyMqcSrlw_2TxPE7Lk';

const params = new URLSearchParams(window.location.search);
const uniId = params.get('id');

async function loadUniversity() {
  if (!uniId) {
    window.location.href = 'index.html';
    return;
  }
  
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  
  // Load university details
  const { data: uni, error: uniError } = await supabase
    .from('universities')
    .select('*')
    .eq('id', uniId)
    .single();
  
  if (uniError || !uni) {
    document.getElementById('content').innerHTML = '<div style="text-align:center; padding:60px;">University not found.</div>';
    return;
  }
  
  // Load circulars
  const { data: circulars } = await supabase
    .from('admission_circulars')
    .select('*')
    .eq('university_id', uniId)
    .eq('is_published', true)
    .order('created_at', { ascending: false });
  
  // Load resources
  const { data: resources } = await supabase
    .from('resources')
    .select('*')
    .eq('university_id', uniId)
    .eq('is_published', true);
  
  renderPage(uni, circulars || [], resources || []);
}

function renderPage(uni, circulars, resources) {
  const categoryClass = uni.category.toLowerCase();
  
  let html = `
    <div class="university-header">
      <span class="category-badge ${categoryClass}">${uni.category}</span>
      <h1 class="university-name">${escapeHtml(uni.name)}</h1>
      <p style="color:#666;">${escapeHtml(uni.description || '')}</p>
      ${uni.website ? `<p style="margin-top:12px;">🌐 <a href="${uni.website}" target="_blank" style="color:#1a73e8;">${uni.website}</a></p>` : ''}
    </div>
  `;
  
  // Admission Circulars Section
  if (circulars.length > 0) {
    html += `
      <div class="section">
        <h3>📢 Admission Circulars</h3>
        ${circulars.map(c => {
          const deadline = c.application_deadline ? new Date(c.application_deadline) : null;
          const isDeadlineSoon = deadline && (deadline - new Date()) / (1000 * 60 * 60 * 24) <= 7;
          
          return `
            <div class="circular-card">
              ${isDeadlineSoon ? '<div class="deadline-warning">⚠️ Deadline approaching soon!</div>' : ''}
              <h4>${escapeHtml(c.title)}</h4>
              ${c.application_deadline ? `<p><strong>Deadline:</strong> ${new Date(c.application_deadline).toLocaleDateString()}</p>` : ''}
              ${c.exam_date ? `<p><strong>Exam Date:</strong> ${new Date(c.exam_date).toLocaleDateString()}</p>` : ''}
              ${c.exam_date_text ? `<p><strong>Exam:</strong> ${escapeHtml(c.exam_date_text)}</p>` : ''}
              ${c.details ? `<p style="margin-top:12px;">${escapeHtml(c.details)}</p>` : ''}
              ${c.circular_link ? `<p style="margin-top:12px;"><a href="${c.circular_link}" target="_blank" class="btn btn-primary">📄 View Full Circular →</a></p>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }
  
  // Resources Section
  if (resources.length > 0) {
    html += `
      <div class="section">
        <h3>📚 Study Materials & Resources</h3>
        ${resources.map(r => `
          <div class="resource-item">
            <div>
              <strong>${escapeHtml(r.title)}</strong>
              <div style="font-size:12px; color:#666;">${r.resource_type}</div>
            </div>
            <a href="${r.file_url}" target="_blank" class="btn btn-primary">View →</a>
          </div>
        `).join('')}
      </div>
    `;
  }
  
  if (circulars.length === 0 && resources.length === 0) {
    html += `<div class="section"><p style="text-align:center; color:#999;">No admission information available yet. Check back soon!</p></div>`;
  }
  
  document.getElementById('content').innerHTML = html;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c]);
}

loadUniversity();
</script>
</body>
</html>
